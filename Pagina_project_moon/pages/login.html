<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Grupo AVAE">
    <title>Project moon website</title>
    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body>
    <header>
        <nav class="navbar">
            <div class="Project">
                <img class="logo" src="../static/images/300px-Project_Moon_Logo.png" alt="Logo">
            </div>
            <div class="nav-links">
                <div class="links">
                    <a href="../index.html" class="link">Inicio</a>
                    <a href="#" class="link">Juegos</a>
                    <a href="" class="link">Mundo</a>
                    <a href="pages/login.html" class="link">Login</a>
                </div>

                <div class="socialMedia">
                    <a href="https://www.youtube.com/?app=desktop&hl=es">
                        <img class="icon" src="../static/images/Youtube_logo.png" alt="youtube">
                    </a>
                    <a href="https://x.com/ProjMoonStudio">
                        <img class="icon" src="../static/images/X_logo_2023_(white).png" alt="X">
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="formulario">
            <div class="form">
                <h1>Crear Cuenta</h1>
                <form action="/procesar-registro" method="POST">
                    <div class="respuesta">
                        <label for="nombre">Nombre Completo:</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <br>
                    <div class="respuesta">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <br>
                    <div class="respuesta">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres"
                            minlength="8" required>
                    </div>
                    <br>
                    <div class="respuesta">
                        <label for="fecha-nacimiento">Fecha de Nacimiento:</label>
                        <input type="date" id="fecha-nacimiento" name="fecha_nacimiento" required>
                    </div>
                    <br>
                    <div class="respuesta">
                        <label for="genero">Género:</label>
                        <select id="genero" name="genero">
                            <option value="">Selecciona una opción</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                            <option value="otro">Otro / Prefiero no decirlo</option>
                        </select>
                    </div>
                    <br>
                    <div class="respuesta Acepto">
                        <input type="checkbox" id="terminos" name="terminos" required>
                        <label for="terminos">Acepto los términos y condiciones</label>
                    </div>
                    <br>

                    <!-- Botón de Envío -->
                    <div class="respuesta">
                        <button type="submit">Registrarse</button>
                    </div>


                </form>
            </div>
        </section>

    </main>
    <footer class="footer">
        <a href="#">Soporte tecnico</a>
        <a href="pages/dudas_frecuentes.html">Dudas frecuentes </a>
    </footer>
</body>

</html>
