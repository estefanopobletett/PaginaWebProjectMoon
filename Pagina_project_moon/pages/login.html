<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Grupo AVAE">
    <title>Project moon website</title>
    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body>
    <header>
        <nav class="navbar">
            <div class="Project">
                <img class="logo" src="../static/images/300px-Project_Moon_Logo.png" alt="Logo">
            </div>
            <div class="nav-links">
                <div class="links">
                    <a href="../index.html" class="link">Volver al Inicio</a>
                </div>

                <div class="socialMedia">
                    <a href="https://www.youtube.com/@ProjectMoonOfficial">
                        <img class="icon" src="../static/images/Youtube_logo.png" alt="youtube">
                    </a>
                    <a href="https://x.com/ProjMoonStudio">
                        <img class="icon" src="../static/images/X_logo_2023_(white).png" alt="X">
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="formularios">
            <div class="forms">
                <h1>Crear Cuenta</h1>
                <form action="/procesar-registro" method="POST" class="soporte-group">
                    <div class="respuestas">
                        <label for="nombre">Nombre de usuario:</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="respuestas">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="respuestas">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres"
                        minlength="8" required>
                    </div>
                    <div class="respuestas">
                        <label for="fecha-nacimiento">Fecha de Nacimiento:</label>
                        <input type="date" id="fecha-nacimiento" name="fecha_nacimiento" required>
                    </div>
                    <div class="respuestas">
                        <label for="genero">Género:</label>
                        <select id="genero" name="genero">
                            <option value="">Selecciona una opción</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                            <option value="otro">Otro / Prefiero no decirlo</option>
                        </select>
                    </div>
                    <div class="respuestas">
                        <label for="terminos">Acepto los términos y condiciones</label>
                        <input type="checkbox" id="terminos" name="terminos" required>

                    </div>
                    <div class="respuestas regis">
                        <button type="submit">Registrarse</button>
                    </div>
                    <div class="respuestas user">
                        Ya tienes una cuenta?
                        <a href="user.html">Inicia sesión aqui</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <footer class="footer">
        <a href="Soporte_tecnico.html">Soporte tecnico</a>
        <a href="dudas_frecuentes.html">Dudas frecuentes </a>
    </footer>
<script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('form').addEventListener('submit', function(event) {
                event.preventDefault();
                window.location.href = "user.html";
            });
        });
    </script>
</body>
</html>
</body>

</html>
