<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Grupo AVAE">
    <title>Soporte Técnico - Project Moon</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="Project">
                <img class="logo" src="../static/images/300px-Project_Moon_Logo.png" alt="Logo">
            </div>
            <div class="nav-links">
                <div class="links">
                    <a href="../index.html" class="link">Volver al Inicio</a>
                    <a href="login.html" class="link">Login</a>
                </div>

                <div class="socialMedia">
                    <a href="https://www.youtube.com/@ProjectMoonOfficial">
                        <img class="icon" src="../static/images/Youtube_logo.png" alt="youtube">
                    </a>
                    <a href="https://x.com/ProjMoonStudio">
                        <img class="icon" src="../static/images/X_logo_2023_(white).png" alt="X">
                    </a>
                </div>
            </div>
        </nav>
    </header>
    <main class="soporte-container">
        <section class="soporte-card">
            <h1>Departamento de Soporte Técnico</h1>
            <p class="soporte-subtitle">Reporte de Anomalías y Errores de Software</p>

            <div class="server-estado">
                <p>Estado de los Servidores de Limbus Company: <strong>OPERATIVOS</strong></p>
            </div>
            <form class="soporte-form" id="soporte-form">
                <div class="form-group">
                    <label for="username">ID de Usuario / Empleado</label>
                    <input type="text" id="username" placeholder="Ej: Dante#1234" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico de Contacto</label>
                    <input type="email" id="email" placeholder="tu_correo@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label for="game">Software / Juego Afectado</label>
                    <select id="game" required>
                        <option value="" disabled selected>Selecciona una opción</option>
                        <option value="lobotomy">Lobotomy Corporation</option>
                        <option value="library">Library of Ruina</option>
                        <option value="limbus">Limbus Company</option>
                        <option value="web">Problema con la Web</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mensaje">Descripción de la Anomalía (Error)</label>
                    <textarea id="mensaje" rows="5" placeholder="Describe detalladamente qué ocurrió..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar a la sede central</button>
            </form>
        </section>

<section id="cuadroGracias" class="reporte">
    <h1>¡¡¡Gracias Por su reporte!!!</h1>
</section>
    </main>

    <footer class="footer">
        <a href="dudas_frecuentes.html">Dudas frecuentes</a>
    </footer>

</body>
<script src="../static/js/script.js"></script>
</html>
